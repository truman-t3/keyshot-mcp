name: Update star history

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/update-star-history.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit updated chart
        run: |
          git config user.name "truman-t3"
          git config user.email "223972290+truman-t3@users.noreply.github.com"
          git add assets/star-history.svg
          git diff --cached --quiet || git commit -m "Update star history chart"
          git push
